openapi: 3.0.1

info:
  title: Definition for Tenant API
  description: This information will be replaced by the SpringFox config information
  version: 0.0.1

paths:
  /tenantadmin:
    post:
      tags:
        - tenant-controller
      summary: 'Creates a new tenant [Authorization: Role: tenant-admin]'
      operationId: createTenant
      requestBody:
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/MultilingualTenantDTO'
      responses:
        200:
          description: OK - successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultilingualTenantDTO'
        400:
          description: BAD REQUEST - invalid/incomplete request or body object
        401:
          description: UNAUTHORIZED - no/invalid Keycloak token
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition
    get:
      tags:
        - tenant-controller
      summary: 'Get all tenants with admin data [Authorization: Role: tenant-admin]'
      operationId: getAllTenantsWithAdminData
      responses:
        200:
          description: OK - successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminTenantDTO'
        204:
          description: NO CONTENT - no content found
        400:
          description: BAD REQUEST - invalid/incomplete request or body object
        401:
          description: UNAUTHORIZED - no/invalid Keycloak token
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition

  /tenantadmin/search:
    get:
      tags:
        - tenant-controller
      summary: 'Get tenants matching the given query [Auth: tenant-admin]'
      operationId: searchTenants
      parameters:
        - name: query
          in: query
          description: URL-encoded infix to search for name or id.
            A non-encoded star symbol searches for all.
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: Page number (first page = 1)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: perPage
          in: query
          description: Number of items returned per page
          schema:
            type: integer
            default: 10
            minimum: 1
        - name: field
          in: query
          description: field to sort by
          schema:
            type: string
            enum: [ NAME, ID ]
            default: NAME
            pattern: '^(NAME|ID)$'
        - name: order
          in: query
          description: sort order
          schema:
            type: string
            enum: [ ASC, DESC ]
            default: ASC
            pattern: '^(ASC|DESC)$'
      responses:
        200:
          description: OK - successful operation
          content:
            'application/hal+json':
              schema:
                $ref: '#/components/schemas/TenantsSearchResultDTO'
        400:
          description: BAD REQUEST - invalid/incomplete request or body object
        401:
          description: UNAUTHORIZED - no/invalid role/authorization
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition
      security:
        - Bearer: [ ]
  /tenantadmin/controls:
    get:
      tags:
        - tenant-controller
      summary: 'Gets platform-level tenant admin controls [Authorization: Super admin]'
      operationId: getTenantAdminControls
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantAdminControls'
        401:
          description: UNAUTHORIZED - no/invalid Keycloak token
        403:
          description: FORBIDDEN - only super admin can access platform controls
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition
    put:
      tags:
        - tenant-controller
      summary: 'Updates platform-level tenant admin controls [Authorization: Super admin]'
      operationId: updateTenantAdminControls
      requestBody:
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/TenantAdminControls'
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantAdminControls'
        401:
          description: UNAUTHORIZED - no/invalid Keycloak token
        403:
          description: FORBIDDEN - only super admin can update platform controls
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition
  /tenantadmin/{id}:
    put:
      tags:
        - tenant-controller
      summary: 'Updates a tenant [Authorization: Role: tenant-admin or single-tenant-admin]'
      operationId: updateTenant
      parameters:
        - name: id
          in: path
          description: Tenant ID
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/MultilingualTenantDTO'
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultilingualTenantDTO'
        401:
          description: UNAUTHORIZED - no/invalid Keycloak token
        409:
          description: CONFLICT - unique constraint validation fails
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition
    get:
      tags:
        - tenant-controller
      summary: 'Gets a tenant by its id [Authorization: Role: tenant-admin or single-tenant-admin]'
      operationId: getMultilingualTenantById
      parameters:
        - name: id
          in: path
          description: Tenant ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultilingualTenantDTO'
        400:
          description: BAD REQUEST - invalid/incomplete request or body object
        401:
          description: UNAUTHORIZED - no/invalid Keycloak token
        404:
          description: Not found
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition
  /tenant:
    get:
      tags:
        - tenant-controller
      summary: 'Get all tenants'
      operationId: getAllTenants
      responses:
        200:
          description: OK - successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BasicTenantLicensingDTO'
        204:
          description: NO CONTENT - no content found
        400:
          description: BAD REQUEST - invalid/incomplete request or body object
        401:
          description: UNAUTHORIZED - no/invalid Keycloak token
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition
  /tenant/{id}:
    summary: Represents a tenant
    description: This resource represents an individual tenant in a system.
    get:
      tags:
        - tenant-controller
      summary: 'Gets a tenant by its id [Authorization: Role: tenant-admin or single-tenant-admin]'
      operationId: getTenantById
      parameters:
        - name: id
          in: path
          description: Tenant ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDTO'
        400:
          description: BAD REQUEST - invalid/incomplete request or body object
        401:
          description: UNAUTHORIZED - no/invalid Keycloak token
        404:
          description: Not found
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition
  /tenant/public/{subdomain}:
    summary: 'Represents a publicly allowed tenant data'
    description: This resource represents an individual tenant in a system.
    get:
      tags:
        - tenant-controller
      summary: 'Gets a tenant public information [Authorization: no-auth]'
      operationId: getRestrictedTenantDataBySubdomain
      parameters:
        - name: subdomain
          in: path
          description: Subdomain
          required: true
          schema:
            type: string
        - name: tenantId
          in: query
          description: Tenant Id
          required: false
          schema:
            type: long
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestrictedTenantDTO'
        404:
          description: Not found
        400:
          description: BAD REQUEST - invalid/incomplete request or body object
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition
  /tenant/public/id/{tenantId}:
    summary: 'Represents a publicly allowed tenant data'
    description: This resource represents an individual tenant in a system.
    get:
      tags:
        - tenant-controller
      summary: 'Gets a tenant public information [Authorization: no-auth]'
      operationId: getRestrictedTenantDataByTenantId
      parameters:
        - name: tenantId
          in: path
          description: Tenant ID
          required: true
          schema:
            type: long
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestrictedTenantDTO'
        404:
          description: Not found
        400:
          description: BAD REQUEST - invalid/incomplete request or body object
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition
  /tenant/public/single:
    summary: 'Represents a publicly allowed tenant data'
    description: This resource represents the tenant in a single-tenant system.
    get:
      tags:
        - tenant-controller
      summary: 'Gets a tenant public information [Authorization: no-auth]'
      operationId: getRestrictedSingleTenancyTenantData
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestrictedTenantDTO'
        404:
          description: Not found
        400:
          description: BAD REQUEST - invalid/incomplete request or body object
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition
  /tenant/public/:
    summary: 'Represents a publicly allowed tenant data. Tenant is resolved based on the request context.
     For single domain multitenancy it overerrides some of the attributes from main tenant and the current tenant like privacy or some tenant settings'
    description: This resource represents the tenant.
    get:
      tags:
        - tenant-controller
      summary: 'Gets a tenant public information [Authorization: no-auth]'
      operationId: getRestrictedTenantData
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestrictedTenantDTO'
        404:
          description: Not found
        400:
          description: BAD REQUEST - invalid/incomplete request or body object
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition
  /tenant/access:
    summary: 'Validate if user can access tenant'
    description: This resource represents the access status for the given user to current tenant.
    get:
      tags:
        - tenant-controller
      summary: 'Validate if user can access tenant [Authorization: no-auth]'
      operationId: canAccessTenant
      responses:
        204:
          description: Successful operation
        401:
          description: UNAUTHORIZED - no/invalid permission for current tenant
        404:
          description: Not found
        400:
          description: BAD REQUEST - invalid/incomplete request or body object
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition
  /tenant/public/dpa/confirm/{token}:
    summary: 'Public confirmation (signature) of a tenant Data Processing Agreement'
    post:
      tags:
        - tenant-controller
      summary: 'Confirms a tenant DPA via a single-use sign token [Authorization: no-auth]'
      operationId: confirmDataProcessingAgreement
      parameters:
        - name: token
          in: path
          description: Single-use sign token from the invite link
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DpaSignatureRequestDTO'
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DpaSignatureDTO'
        400:
          description: BAD REQUEST - invalid/incomplete request or body object
        410:
          description: GONE - token unknown, already used, or expired
        500:
          description: INTERNAL SERVER ERROR - server encountered unexpected condition
components:
  schemas:
    DpaSignatureRequestDTO:
      type: object
      required:
        - signerName
      properties:
        signerName:
          type: string
          example: "Erika Mustermann"
        signerPosition:
          type: string
          example: "Geschäftsführerin"
        signerIsMember:
          type: boolean
          example: false
        language:
          type: string
          example: "de"
    DpaSignatureDTO:
      type: object
      properties:
        tenantId:
          type: long
        status:
          type: string
          example: "SIGNED"
        signerName:
          type: string
        signedAt:
          type: string
    TenantDTO:
      type: object
      required:
        - id
        - name
        - subdomain
      properties:
        id:
          type: long
          example: 12132
        name:
          type: string
          example: "Company name AG"
          maxLength: 40
        subdomain:
          type: string
          example: "companyname"
          maxLength: 100
        address:
          type: string
          maxLength: 255
          example: "Musterstraße 1, 12345 Musterstadt"
        description:
          type: string
          example: "Short description of the tenant."
        createDate:
          type: string
        updateDate:
          type: string
        licensing:
          $ref: '#/components/schemas/Licensing'
        theming:
          $ref:
            '#/components/schemas/Theming'
        content:
          $ref:
            '#/components/schemas/Content'
        settings:
          $ref:
            '#/components/schemas/Settings'
    MultilingualTenantDTO:
          type: object
          required:
            - name
          properties:
            id:
              type: long
              example: 12132
            name:
              type: string
              example: "Company name AG"
              maxLength: 40
            subdomain:
              type: string
              example: "companyname"
              maxLength: 100
            address:
              type: string
              maxLength: 255
              example: "Musterstraße 1, 12345 Musterstadt"
            description:
              type: string
              example: "Short description of the tenant."
            adminEmails:
              type: array
              items:
                type: string
              example: "[admin1@ob.de, admin2@ob.de]"
            createDate:
              type: string
            updateDate:
              type: string
            licensing:
              $ref: '#/components/schemas/Licensing'
            theming:
              $ref:
                '#/components/schemas/Theming'
            content:
              $ref:
                '#/components/schemas/MultilingualContent'
            settings:
              $ref:
                '#/components/schemas/Settings'
    BasicTenantLicensingDTO:
      type: object
      required:
        - id
        - name
        - subdomain
      properties:
        id:
          type: long
          example: 12132
        name:
          type: string
          example: "Company name AG"
          maxLength: 40
        subdomain:
          type: string
          example: "companyname"
          maxLength: 100
        createDate:
          type: string
        updateDate:
          type: string
        licensing:
          $ref: '#/components/schemas/Licensing'
    RestrictedTenantDTO:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: long
          example: 12132
        name:
          type: string
          example: "Company name AG"
          maxLength: 40
        subdomain:
          type: string
          example: "subdomain"
          maxLength: 100
        theming:
          $ref:
            '#/components/schemas/Theming'
        content:
          $ref:
            '#/components/schemas/Content'
        settings:
          $ref:
            '#/components/schemas/Settings'
    Licensing:
      type: object
      required:
        - allowedNumberOfUsers
      properties:
        allowedNumberOfUsers:
          type: integer
          example: 1
    Theming:
      type: object
      properties:
        logo:
          type: string
          example: "base64 encoded image"
        associationLogo:
          type: string
          example: "base64 encoded image"
        favicon:
          type: string
          example: "base64 encoded image"
        primaryColor:
          type: string
          example: "#FFFFFF"
        secondaryColor:
          type: string
          example: "#FFFFFF"
    Content:
      type: object
      required:
        - impressum
      properties:
        impressum:
          type: string
          example: "Llorem ipsum..."
        claim:
          type: string
          example: "Llorem ipsum..."
          maxLength: 40
        privacy:
          type: string
          example: "Llorem ipsum..."
        renderedPrivacy:
          type: string
          example: "Llorem ipsum..."
        termsAndConditions:
          type: string
          example: "Llorem ipsum..."
        termsAndConditionsConfirmation:
          type: string
          format: date-time
          example: 2022-12-07T11:51:01
          description: "Datetime stamp when new terms and condition defined"
        dataPrivacyConfirmation:
          type: string
          format: date-time
          example: 2022-12-07T11:51:01
          description: "Datetime stamp when new privacy defined"
        dataProtectionContactTemplate:
          $ref: '#/components/schemas/DataProtectionContactTemplateDTO'

    Settings:
      type: object
      properties:
        featureStatisticsEnabled:
          type: boolean
          example: "false"
        featureTopicsEnabled:
          type: boolean
          example: "false"
        topicsInRegistrationEnabled:
          type: boolean
          example: "false"
        featureDemographicsEnabled:
          type: boolean
          example: "false"
        featureAppointmentsEnabled:
          type: boolean
          example: "false"
        featureGroupChatV2Enabled:
          type: boolean
          example: "false"
        featureToolsEnabled:
          type: boolean
          example: "false"
        featureAnonymousChatEnabled:
          type: boolean
          example: "true"
        featureCallsEnabled:
          type: boolean
          example: "true"
        featureSupervisionEnabled:
          type: boolean
          example: "true"
          description: "Master toggle for supervision functionality (adding/removing supervisors, supervision views)."
        featureSupervisionAnonymousChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable supervision functionality in anonymous chats."
        featureSupervisionOneOnOneChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable supervision functionality in 1-on-1 chats."
        featureAudioCallsEnabled:
          type: boolean
          example: "true"
          description: "Master toggle for audio call button availability (all chat types)."
        featureAudioCallsAnonymousChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable audio call button in anonymous chats."
        featureAudioCallsOneOnOneChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable audio call button in 1-on-1 chats."
        featureAudioCallsGroupChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable audio call button in group chats."
        featureAudioCallsSupervisionChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable audio call button when a user is in supervision mode."
        featureVideoCallsEnabled:
          type: boolean
          example: "true"
          description: "Master toggle for video call button availability (all chat types)."
        featureVideoCallsAnonymousChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable video call button in anonymous chats."
        featureVideoCallsOneOnOneChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable video call button in 1-on-1 chats."
        featureVideoCallsGroupChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable video call button in group chats."
        featureVideoCallsSupervisionChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable video call button when a user is in supervision mode."
        featureThreadsEnabled:
          type: boolean
          example: "true"
          description: "Master toggle for threads availability (all chat types)."
        featureThreadsAnonymousChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable threads in anonymous chats."
        featureThreadsGroupChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable threads in group chats."
        featureThreadsOneOnOneEnabled:
          type: boolean
          example: "true"
          description: "Enable threads in 1-on-1 chats."
        featureThreadsSupervisionChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable threads when a user is in supervision mode."
        featureVoiceMessagesEnabled:
          type: boolean
          example: "true"
          description: "Master toggle for voice messages availability (all chat types)."
        featureVoiceMessagesAnonymousChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable voice messages in anonymous chats."
        featureVoiceMessagesOneOnOneChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable voice messages in 1-on-1 chats."
        featureVoiceMessagesGroupChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable voice messages in group chats."
        featureVoiceMessagesSupervisionChatsEnabled:
          type: boolean
          example: "true"
          description: "Enable voice messages when a user is in supervision mode."
        featureAttachmentUploadDisabled:
          type: boolean
          example: "false"
        featureToolsOICDToken:
          type: string
          example: "1234-1234-1234-1234"
        activeLanguages:
          type: array
          items:
            type: string
          example: "[en, de, fr]"
        showAskerProfile:
          type: boolean
          default: false
          example: "false"
        isVideoCallAllowed:
          type: boolean
          default: false
          example: "false"
        featureSystemNotificationEmailsEnabled:
          type: boolean
          example: "false"
        smtp:
          $ref: '#/components/schemas/SmtpConfig'
        extendedSettings:
          $ref: './../services/consultingtypeservice.yaml#/components/schemas/ConsultingTypePatchDTO'
        featureCentralDataProtectionTemplateEnabled:
          type: boolean
          example: "false"
        tenantAdminControls:
          $ref: '#/components/schemas/TenantAdminControls'

    TenantAdminControls:
      type: object
      properties:
        permissionsPageEnabled:
          type: boolean
          example: "true"
        allowedPermissionToggles:
          $ref: '#/components/schemas/TenantAdminAllowedPermissionToggles'

    TenantAdminAllowedPermissionToggles:
      type: object
      properties:
        appearance:
          type: boolean
          example: "true"
        anonymousChat:
          type: boolean
          example: "true"
        calls:
          type: boolean
          example: "true"
        groupChat:
          type: boolean
          example: "true"
        supervision:
          type: boolean
          example: "true"
        supervisionAnonymousChats:
          type: boolean
          example: "true"
        supervisionOneOnOneChats:
          type: boolean
          example: "true"
        audioCalls:
          type: boolean
          example: "true"
        audioCallsAnonymousChats:
          type: boolean
          example: "true"
        audioCallsOneOnOneChats:
          type: boolean
          example: "true"
        audioCallsGroupChats:
          type: boolean
          example: "true"
        audioCallsSupervisionChats:
          type: boolean
          example: "true"
        videoCalls:
          type: boolean
          example: "true"
        videoCallsAnonymousChats:
          type: boolean
          example: "true"
        videoCallsOneOnOneChats:
          type: boolean
          example: "true"
        videoCallsGroupChats:
          type: boolean
          example: "true"
        videoCallsSupervisionChats:
          type: boolean
          example: "true"
        threads:
          type: boolean
          example: "true"
        threadsAnonymousChats:
          type: boolean
          example: "true"
        threadsOneOnOneChats:
          type: boolean
          example: "true"
        threadsGroupChats:
          type: boolean
          example: "true"
        threadsSupervisionChats:
          type: boolean
          example: "true"
        voiceMessages:
          type: boolean
          example: "true"
        voiceMessagesAnonymousChats:
          type: boolean
          example: "true"
        voiceMessagesOneOnOneChats:
          type: boolean
          example: "true"
        voiceMessagesGroupChats:
          type: boolean
          example: "true"
        voiceMessagesSupervisionChats:
          type: boolean
          example: "true"

    SmtpConfig:
      type: object
      properties:
        enabled:
          type: boolean
          example: "false"
        host:
          type: string
          example: "smtp.titan.email"
        port:
          type: integer
          example: 587
        secure:
          type: boolean
          example: "false"
        username:
          type: string
          example: "notifications@oriso.org"
        password:
          type: string
          example: "********"
        from:
          type: string
          example: "notifications@oriso.org"
        emailThemeColor:
          type: string
          example: "#0f3b8f"

    MultilingualContent:
      type: object
      required:
        - impressum
      properties:
        impressum:
          type: object
          additionalProperties:
            type: string
        claim:
          type: object
          additionalProperties:
            type: string
        privacy:
          type: object
          additionalProperties:
            type: string
        confirmPrivacy:
          type: boolean
        termsAndConditions:
          type: object
          additionalProperties:
            type: string
        confirmTermsAndConditions:
          type: boolean
        dataProtectionContactTemplate:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DataProtectionContactTemplateDTO'

    DataProtectionContactTemplateDTO:
        type: object
        properties:
            agencyContext:
              $ref: '#/components/schemas/AgencyContextDTO'
            noAgencyContext:
              $ref: '#/components/schemas/NoAgencyContextDTO'

    AgencyContextDTO:
      type: object
      properties:
        responsibleContact:
          type: string
        dataProtectionOfficer:
          $ref: '#/components/schemas/DataProtectionOfficerDTO'

    NoAgencyContextDTO:
      type: object
      properties:
        responsibleContact:
          type: string
        dataProtectionOfficerContact:
          type: string

    DataProtectionOfficerDTO:
      type: object
      properties:
        agencyResponsibleContact:
          type: string
        alternativeRepresentativeContact:
          type: string
        dataProtectionOfficerContact:
          type: string


    AdminTenantDTO:
      type: object
      required:
        - id
        - name
        - subdomain
      properties:
        id:
          type: long
          example: 12132
        name:
          type: string
          example: "Company name AG"
          maxLength: 40
        subdomain:
          type: string
          example: "companyname"
          maxLength: 100
        address:
          type: string
          maxLength: 255
          example: "Musterstraße 1, 12345 Musterstadt"
        description:
          type: string
          example: "Short description of the tenant."
        beraterCount:
          type: integer
          example: 10
        adminEmails:
          type: array
          items:
            type: string
          example: "[admin1@ob.de, admin2@ob.de]"
        createDate:
          type: string
        updateDate:
          type: string

    TenantsSearchResultDTO:
      type: object
      properties:
        _embedded:
          type: array
          items:
            $ref: '#/components/schemas/AdminTenantDTO'
        _links:
          $ref: '#/components/schemas/PaginationLinks'
        total:
          type: integer

    PaginationLinks:
      type: object
      required:
        - self
      properties:
        self:
          $ref: '#/components/schemas/HalLink'
        next:
          $ref: '#/components/schemas/HalLink'
        previous:
          $ref: '#/components/schemas/HalLink'

    HalLink:
      type: object
      required:
        - href
      properties:
        href:
          type: string
        method:
          type: string
          enum: [ GET, POST, DELETE, PUT ]
        templated:
          type: boolean
